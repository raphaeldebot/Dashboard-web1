<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOC 1 — Authentification & Regex</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      /* ============================================================
   BASE — fourni, ne pas modifier
============================================================ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f4efe6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-box {
        background: white;
        border: 2px solid #1a1a1a;
        padding: 40px;
        width: 460px;
      }

      .auth-box h1 {
        font-size: 28px;
        margin-bottom: 6px;
      }
      .auth-box .sub {
        color: #7a7268;
        font-size: 14px;
        margin-bottom: 30px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 30px;
        border-bottom: 2px solid #1a1a1a;
      }
      .tab {
        padding: 12px 0;
        margin-right: 28px;
        font-family: monospace;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        background: none;
        border: none;
        color: #7a7268;
        position: relative;
      }
      .tab.active {
        color: #1a1a1a;
        font-weight: bold;
      }
      .tab.active::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 3px;
        background: #ff4d2e;
      }

      /* Champs */
      .field {
        margin-bottom: 20px;
      }
      .field label {
        display: block;
        font-family: monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }
      .field input {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-bottom: 2px solid #1a1a1a;
        background: transparent;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      .field input:focus {
        border-bottom-color: #2d5fff;
      }
      .field .hint {
        margin-top: 6px;
        font-family: monospace;
        font-size: 11px;
        color: #7a7268;
        min-height: 14px;
      }

      /* États de validation */
      .field.error input {
        border-bottom-color: #ff4d2e;
      }
      .field.error .hint {
        color: #ff4d2e;
        font-weight: bold;
      }
      .field.ok input {
        border-bottom-color: #1aa179;
      }
      .field.ok .hint {
        color: #1aa179;
        font-weight: bold;
      }
      .field.ok .hint::before {
        content: "✓ ";
      }

      /* Jauge mot de passe */
      .strength {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .strength span {
        flex: 1;
        height: 4px;
        background: #ddd;
        border-radius: 2px;
        transition: background 0.3s;
      }
      .strength span.faible {
        background: #ff4d2e;
      }
      .strength span.moyen {
        background: #ffd23f;
      }
      .strength span.fort {
        background: #1aa179;
      }

      /* Bouton */
      .submit-btn {
        width: 100%;
        padding: 16px;
        background: #1a1a1a;
        color: white;
        border: none;
        font-family: monospace;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        cursor: pointer;
        margin-top: 10px;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .submit-btn:hover {
        background: #ff4d2e;
      }
      .submit-btn.shake {
        animation: shake 0.4s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      /* Flash message */
      .flash {
        margin-top: 16px;
        padding: 12px 16px;
        font-family: monospace;
        font-size: 12px;
        border-left: 4px solid;
        display: none;
      }
      .flash.ok {
        background: rgba(26, 161, 121, 0.1);
        border-color: #1aa179;
        color: #1aa179;
      }
      .flash.err {
        background: rgba(255, 77, 46, 0.1);
        border-color: #ff4d2e;
        color: #ff4d2e;
      }

      /* Page de bienvenue (cachée au départ) */
      #welcome {
        text-align: center;
        display: none;
      }
      #welcome h2 {
        font-size: 36px;
        margin-bottom: 12px;
      }
      #welcome p {
        color: #7a7268;
        margin-bottom: 24px;
      }
      #welcome .logout {
        padding: 10px 24px;
        background: #1a1a1a;
        color: white;
        border: none;
        font-family: monospace;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
     ZONE D'AUTHENTIFICATION
============================================================ -->
    <div id="authBox" class="auth-box">
      <h1>jQuery Academy</h1>
      <p class="sub">Crée ton compte pour accéder au dashboard.</p>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" data-form="signupForm">Inscription</button>
        <button class="tab" data-form="loginForm">Connexion</button>
      </div>

      <!-- ==============================
         FORMULAIRE INSCRIPTION
    ============================== -->
      <div id="signupForm">
        <!-- Champ username -->
        <div class="field" id="f-username">
          <label for="signup-username">Nom d'utilisateur</label>
          <input
            type="text"
            id="signup-username"
            placeholder="ex: jean_dev"
            autocomplete="off"
          />
          <div class="hint">3 à 16 caractères : lettres, chiffres, _ ou -</div>
        </div>

        <!-- Champ email -->
        <div class="field" id="f-email">
          <label for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            placeholder="prenom@domaine.com"
            autocomplete="off"
          />
          <div class="hint">Format email standard requis</div>
        </div>

        <!-- Champ password -->
        <div class="field" id="f-password">
          <label for="signup-password">Mot de passe</label>
          <input
            type="password"
            id="signup-password"
            placeholder="••••••••"
            autocomplete="off"
          />
          <div class="hint">
            8+ caractères, 1 majuscule, 1 chiffre, 1 spécial
          </div>
          <!-- Jauge de force -->
          <div class="strength">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <button class="submit-btn" id="signupBtn">Créer le compte →</button>

        <div class="flash" id="signupFlash"></div>
      </div>

      <!-- ==============================
         FORMULAIRE CONNEXION
    ============================== -->
      <div id="loginForm" style="display: none">
        <div class="field" id="f-login-email">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="prenom@domaine.com"
            autocomplete="off"
          />
          <div class="hint">&nbsp;</div>
        </div>

        <div class="field" id="f-login-password">
          <label for="login-password">Mot de passe</label>
          <input
            type="password"
            id="login-password"
            placeholder="••••••••"
            autocomplete="off"
          />
          <div class="hint">&nbsp;</div>
        </div>

        <button class="submit-btn" id="loginBtn">Se connecter →</button>

        <div class="flash" id="loginFlash"></div>
      </div>
    </div>

    <!-- ============================================================
     PAGE D'ACCUEIL (après connexion)
============================================================ -->
    <div id="welcome" class="auth-box">
      <h2>Bienvenue 🎉</h2>
      <p id="welcomeMsg">Connexion réussie !</p>
      <button class="logout" id="logoutBtn">Se déconnecter</button>
    </div>

    <script>
      /* ============================================================
   ÉTAT GLOBAL (stocke le compte inscrit en mémoire)
============================================================ */
      let registeredUser = null; // { username, email, password }
      let isLoggedIn = false;

      /* ============================================================
   REGEX — à compléter !
   Référence MDN : https://developer.mozilla.org/fr/docs/Web/JavaScript/Guide/Regular_expressions
============================================================ */
      const REGEX = {
        // TODO 1 — Regex username
        // Règle : entre 3 et 16 caractères
        //         uniquement lettres (a-z, A-Z), chiffres, underscore _ ou tiret -
        // Indice : ^ = début, $ = fin, [groupe]{min,max}
        username: /^.{3,16}$/,

        // TODO 2 — Regex email
        // Règle : qqch @ qqch . qqch (au moins 2 lettres pour le domaine)
        // Indice : \. pour un vrai point, + = un ou plusieurs, {2,} = au moins 2
        email: /^[\w.-]+@[\w.-]+\.\w{2,}$/,

        // TODO 3 — Regex password (la plus complexe !)
        // Règle : 8 caractères minimum
        //         au moins 1 minuscule, 1 majuscule, 1 chiffre, 1 caractère spécial
        // Indice : (?=...) = lookahead positif (vérifie sans consommer)
        //          (?=.*[A-Z]) = doit contenir au moins une majuscule quelque part
        password:
          /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_\-+=\[\]{};:'",.<>\/?\\|`~]).{8,}$/,
      };

============================================================ */

      $(".tab").on("click", function () {

      });

      /* ============================================================
   VALIDATION TEMPS RÉEL — username
============================================================ */

      // TODO 5 — Sur l'événement "keyup" de #signup-username :
      //   - Récupérer la valeur avec .val()
      //   - Tester avec REGEX.username.test(valeur)
      //   - Si valide → ajouter classe "ok" sur #f-username, message positif dans .hint
      //   - Si invalide → ajouter classe "error", message d'erreur précis dans .hint
      //   - Penser à .removeClass("ok error") au début pour reset l'état précédent

      $("#signup-username").on("keyup", function () {
        // Ton code ici ↓
      });

      /* ============================================================
   VALIDATION TEMPS RÉEL — email
============================================================ */

      // TODO 6 — Même logique que le username, pour #signup-email
      //           Tester avec REGEX.email.test(valeur)

      $("#signup-email").on("keyup", function () {
        // Ton code ici ↓
      });

      /* ============================================================
   VALIDATION TEMPS RÉEL — password + jauge de force
============================================================ */

      // TODO 7 — Sur "keyup" de #signup-password :
      //   a) Calculer un score de 0 à 4 :
      //      +1 si longueur >= 8
      //      +1 si contient minuscule ET majuscule
      //      +1 si contient un chiffre
      //      +1 si contient un caractère spécial
      //
      //   b) Mettre à jour la jauge .strength span :
      //      Utilise .each(function(i){...}) pour boucler sur les 4 spans
      //      Si i < score → ajouter la bonne classe (faible / moyen / fort)
      //      Sinon retirer toutes les classes
      //
      //   c) Valider ou invalider le champ avec REGEX.password.test(valeur)

      $("#signup-password").on("keyup", function () {
        // Ton code ici ↓
      });

      /* ============================================================
   BOUTON INSCRIPTION
============================================================ */

      // TODO 8 — Au clic sur #signupBtn :
      //   1. Lire les 3 valeurs (username, email, password)
      //   2. Tester les 3 regex
      //   3. Si erreurs → collecter dans un tableau, shake sur le bouton,
      //      afficher dans #signupFlash (classe "err") avec .slideDown(300)
      //   4. Si tout OK → stocker dans registeredUser = { username, email, password }
      //      Afficher message succès dans #signupFlash (classe "ok")
      //      Après 800ms, appeler doLogin()

      $("#signupBtn").on("click", function () {
        // Ton code ici ↓
      });

      /* ============================================================
   BOUTON CONNEXION
============================================================ */

      // TODO 9 — Au clic sur #loginBtn :
      //   1. Vérifier que registeredUser existe (sinon → message "inscris-toi d'abord")
      //   2. Vérifier que l'email est valide (REGEX.email)
      //   3. Comparer email + password avec registeredUser.email / .password
      //   4. Si OK → appeler doLogin()
      //   5. Sinon → shake + flash "err"

      $("#loginBtn").on("click", function () {
        // Ton code ici ↓
      });

      /* ============================================================
   CONNEXION / DÉCONNEXION — logique fournie, ne pas modifier
============================================================ */
      function doLogin() {
        $("#authBox").fadeOut(400, function () {
          const msg =
            "Bienvenue <strong>" +
            registeredUser.username +
            "</strong> ! Tu es connecté·e.";
          $("#welcomeMsg").html(msg);
          $("#welcome").fadeIn(400);
        });
      }

      $("#logoutBtn").on("click", function () {
        $("#welcome").fadeOut(400, function () {
          $("#login-email, #login-password").val("");
          $(".flash").hide();
          $(".tab").first().trigger("click"); // reset sur l'onglet inscription
          $("#authBox").fadeIn(400);
        });
      });
    </script>

        bottom: 0;

  </body>
</html>
